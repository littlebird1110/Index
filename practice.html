<html>
<head>
    <title>Death of The Devil</title>
    <style>
        /* 1. Reset margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #481F1D;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container that lets it be OK upon any resize. */
        #game-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* Aspect Ratio... */
            max-height: 100vh;
            max-width: 177.78vh; /* More aspect ratio... */
            background-image: url('images/Home_Screen.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 0 50px black;
        }

        /* 3. Hotspot Logic */
        .hotspot {
            position: absolute;
            cursor: pointer;
            /* Toggle background to 'transparent' when you finish testing */
            background: transparent; 
            z-index: 10;
        }

        /* Rain/Fire/Video CSS */
        #rain-effect {
            position: absolute;
            width: 28%; /* Using % keeps it scaled with the game */
            top: 19%;
            left: -2.5%;
            pointer-events: none; 
            opacity: 90;
        }

        #fire-effect {
            position: absolute;
            width: 17%;
            bottom: 20%;
            left: 46%;
            pointer-events: none;
        }

        #water-video {
            position: absolute;
            top: 145px;
            right: 222px;
            z-index: 5;
            opacity: 80;
            width: 169px

        }

        /* Clue Positions */
        #clue-police-file { top: 86%; left: 48%; width: 5%; height: 8%; }
        #clue-signet-ring { top: 85%; left: 81.75%; width: 2%; height: 3%; }
        #clue-photo       { top: 40%; left: 34%; width: 5%; height: 4%; }
        #clue-the-will1   { top: 81%; left: 34%; width: 3%; height: 3%; }
        #clue-the-will2   { top: 80%; left: 6%;  width: 6%; height: 5%; }
        #clue-the-will3   { top: 84%; left: 38%; width: 5%; height: 8%; }
        #clue-glasses     { top: 86%; left: 58%; width: 7%; height: 5%; }
        #clue-muddy-print { top: 60%; left: 7%;  width: 4%; height: 5%; }
        #clue-bloody-print { top: 90%; left: 18%; width: 3%; height: 8%; }
        #clue-checks      { top: 82%; left: 54%; width: 3%; height: 3%; }
        #clue-letter      { top: 41%; left: 51%; width: 3%; height: 3%; }
        #clue-open-window { top: 23%; left: 2%;  width: 17%; height: 36%; }
        #clue-orange-knife { top: 29%; left: 94%; width: 5%; height: 4%; } 
        #clue-yellow-knife { top: 8%;  left: 76%; width: 5%; height: 4%; } 
        #clue-green-knife  { top: 40%; left: 67%; width: 5%; height: 4%; } 
        #clue-blue-knife   { top: 16%; left: 14%; width: 5%; height: 4%; } 
        #clue-purple-knife { top: 6%;  left: 13%; width: 5%; height: 4%; } 
    </style>
</head>
<body>

    <div id="game-container">
        <div id="clue-police-file" class="hotspot" onclick="showClue('Dear Detective Blanc, Thank you for taking on the case of Able LeDomas. As you know Mr. LeDomas was one of the founders and current owner of “LeDomas Entertainment”, the game company. So with money like that you can bet this case is gonna be messy. Mr. LeDomas was found by his daughter, Elizabeth, in his home with multiple stab wounds on Monday November 10 at 8:00am. The murder weapon has NOT been found. All of the LeDomas children had all seen Able the day before; police have already interrogated them. Hopefully, with their statements and the evidence you collect from the house you can put this case to rest. Good luck. Sincerely, Mr E
')"></div>
        <div id="clue-signet-ring" class="hotspot" onclick="showClue('Signet Ring: it was under Able’s chair and marked: C. LeDomas. Cain and Able had matching signet rings. They NEVER took them off; they’d rather die than part with them.')"></div>
        <div id="clue-photo" class="hotspot" onclick="showClue('The Photo: it was in a box on the mantle. The photo is of Cain and Able in front of the LeDomas company building. Able in red and Cain in orange. There is a big blood splatter on the photo… right over Able.')"></div>
        <div id="clue-the-will1" class="hotspot" onclick="showClue('A Will: it was by the fireplace it is burned so you can’t read all of it but you can make out the phrase “you will never inherit my empire”. It is signed “Able LeDomas” but the signature looks off; it might not be Able’s handwriting.')"></div>
        <div id="clue-the-will2" class="hotspot" onclick="showClue('A Will: it was under the open window and has some water damage but you can make out the phrase “C—----- LeDomas you shall inherit my entire empire” you can’t make out the first name. It is signed “Able LeDomas” but the signature looks off; it might not be Able’s handwriting.')"></div>
        <div id="clue-the-will3" class="hotspot" onclick="showClue('A Will: it was on the coffee table it says that all Able’s assets are to be split among his children fairly. It is signed “Able LeDomas” but the signature looks off; it might not be Able’s handwriting.')"></div>
        <div id="clue-glasses" class="hotspot" onclick="showClue('Elizabeths Glasses: left on the coffee table in the den. There is a small red drop of something, maybe blood, on the lens')"></div>
        <div id="clue-muddy-print" class="hotspot" onclick="showClue('Muddy Print: it was on the window sill; the window leads outside which means the killer could have come and gone through the window. Unfortunately the print is not clear enough to determine whose it is.')"></div>
        <div id="clue-bloody-print" class="hotspot" onclick="showClue('Bloody Print: it was in the den. Could be Elizabeth’s as she did mention she accidentally stepped in the blood when she discovered her father. When asked about it Caroline quickly said it could be Elizabeth’s.')"></div>
        <div id="clue-checks" class="hotspot" onclick="showClue('Checks: they were in Able’s office. All the checks are for the same amount, $1,500, and are sent out for cash to Charles LeDomas from Able. However the signature looks off; it might not be Able’s handwriting.')"></div>
        <div id="clue-letter" class="hotspot" onclick="showClue('The Letter: it was on the mantel The letter has no return address and is signed C. All the letter says is “I told you you shouldn’t have done that”. ')"></div>
        <div id="clue-open-window" class="hotspot" onclick="showClue('Open Window: One of the windows on the ground floor is open with what looks like a foot print on the window sill. The window could have been used by the killer to get in and out.')"></div>
        <div id="clue-orange-knife" class="hotspot" onclick="showClue('A Knife: it was on the wall with an orange handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>
        <div id="clue-yellow-knife" class="hotspot" onclick="showClue('A Knife: it was on the wall with a yellow handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>
        <div id="clue-green-knife" class="hotspot" onclick="showClue('A Knife:  it was on the mantel with a green handle. It is a real knife but used for decoration. It is very clean…  everything else on the mantel has a thin layer of dust.')"></div>
        <div id="clue-blue-knife" class="hotspot" onclick="showClue('A Knife: it was on the wall with a blue handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>
        <div id="clue-purple-knife" class="hotspot" onclick="showClue('A Knife: it was on the wall with a purple handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>

        <img src="images/rain.gif" alt="lightning" id="rain-effect">
        <img src="images/fire.gif" alt="fire" id="fire-effect">

        <video width="260" height="110" controls id="water-video">
            <source src="images/Water_2.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="bg-music" loop>
        <source src="images/sound2.m4a" type="audio/mp4">
    </audio>

    <script>
        function showClue(message) {
            alert("You found: " + message);
            // Audio bypass
            document.getElementById('bg-music').play();
        }
    </script>
