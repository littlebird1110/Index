<div id="art-canvas">
  <!-- Invisible clickable areas -->
  <div id="clue-police-file" class="hotspot" onclick="showClue('Dear Detective Blanc, Thank you for taking on the case of Able LeDomas. As you know Mr. LeDomas was one of the founders and current owner of “LeDomas Entertainment”, the game company So with money like that you can bet this case is gonna be messy. Mr. LeDomas was found by his daughter, Elizabeth, in his home with multiple stab wounds on Monday November 10 at 8:00am. His other children had all seen him the day before; police have already interrogated the 4 children. Hopefully, with their statements and the evidence you collect from the house you can put this case to rest. Good luck. Sincerely, Mr E
')"></div>
  <div id="clue-signet-ring" class="hotspot" onclick="showClue('A Signet Ring: Found under Able’s chair and marked: C. LeDomas. Cain and Able had matching signet rings. They NEVER took them off; they’d rather die than part with them. ')"></div>
  <div id="clue-photo" class="hotspot" onclick="showClue('A Photo: Found in a box on the mantle. The photo is of Cain and Able in front of the LeDomas company building. Able in red and Cain in orange. There is a big blood splatter on the photo… right over Able')"></div>
  <div id="clue-the-will1" class="hotspot" onclick="showClue('A Will: found by the fireplace it is burned so you can’t read all of it but you can make out the phrase “you will never inherit my empire”. It is signed “Able LeDomas” but the signature looks off; it might not be Able’s handwriting.')"></div>
  <div id="clue-the-will2" class="hotspot" onclick="showClue('A Will: found under the open window and has some water damage but you can make out the phrase “C—----- LeDomas you shall inherit my entire empire” you can’t make out the first name. It is signed “Able LeDomas” but the signature looks off; it might not be Able’s handwriting.')"></div>
  <div id="clue-the-will3" class="hotspot" onclick="showClue('A Will: found on the coffee table it says that all Able’s assets are to be split among his children fairly. It is signed “Able LeDomas” but the signature looks off; it might not be Able’s handwriting. ')"></div>
  <div id="clue-glasses" class="hotspot" onclick="showClue('Glasses: Elizabeth’s glasses were left on the coffee table in the den. There is a small red drop of something, maybe blood, on the lens')"></div>
  <div id="clue-muddy-print" class="hotspot" onclick="showClue('Muddy Print: found on the window sill; the window leads outside which means the killer could have come and gone through the window. Unfortunately the print is not clear enough to determine whose it is')"></div>
  <div id="clue-bloody-print" class="hotspot" onclick="showClue('Bloody Print: found in the den. Could be Elizabeth’s as she did mention she accidentally stepped in the blood when she discovered her father. When asked about it Caroline quickly said it could be Elizabeth’s.')"></div>
  <div id="clue-checks" class="hotspot" onclick="showClue('Checks: Found in Able’s office. All the checks are for the same amount, $1,500, and are sent out for cash to Charles LeDomas from Able. However the signature looks off; it might not be Able’s handwriting.')"></div>
  <div id="clue-letter" class="hotspot" onclick="showClue('The Letter: Found on the mantel The letter has no return address and is signed C. All the letter says is: I told you you shouldn’t have done that')"></div>
  <div id="clue-open-window" class="hotspot" onclick="showClue('Open Window: One of the windows on the ground floor is open with what looks like a foot print on the window sill.')"></div>
  <div id="clue-orange-knife" class="hotspot" onclick="showClue('Orange Knife: Found on the wall with an orange handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>
  <div id="clue-yellow-knife" class="hotspot" onclick="showClue('Yellow Knife: Found on the wall with a yellow handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>
  <div id="clue-green-knife" class="hotspot" onclick="showClue('Green Knife: Found on the mantel with a green handle. It is a real knife but used for decoration. It is very clean…  everything else on the mantel has a thin layer of dust.')"></div>
  <div id="clue-blue-knife" class="hotspot" onclick="showClue('Blue Knife: Found on the wall with a blue handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>
  <div id="clue-purple-knife" class="hotspot" onclick="showClue('Purple Knife: Found on the wall with a purple handle. It is a real knife but used for decoration. It is very clean…  everything else on the wall has a thin layer of dust.')"></div>
