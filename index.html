<html>
  <style>
      #art-canvas {
      background-image: url('images/Home Page.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      margin: 0 auto;
    }

  /* The transparent "Hotspot" */
  .hotspot {
    position: absolute;
    cursor: pointer;
    /* Use background: rgba(255, 0, 0, 0.3); to see them while testing!, transparent when ready */
    background: rgba(255,0,0,0.3); 
  }

  /* Position each clue area specifically */
  #clue-police-file {
    top: 10%;
    left: 10%;
    width: 10%;
    height: 10%;
  }

  #clue-signet-ring {
    top: 10%;
    left: 80%;
    width: 5%;
    height: 20%;
  }
    
    #clue-photo {
      top: 15%;
      left: 10%;
      width: 10%
      height: 10%
    }
</style>
</head>

<div id="art-canvas">
  <!-- Invisible clickable areas -->
  <div id="clue-police-file" class="hotspot" onclick="showClue('don't forget')"></div>
  <div id="clue-signet-ring" class="hotspot" onclick="showClue('A faint clicking sound comes from the wall...')"></div>
  <div id="clue-photo" class="hotspot" onclick="showClue('don't forget')"></div>
</div>

<script>
  function showClue(message) {
    alert(message);
  }
</script>
</html>
