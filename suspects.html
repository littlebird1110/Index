<div id="art-canvas">

  <div id="clue-Elizabeth" class="hotspot" onclick="showClue('Description: Able LeDomas’ youngest daughter, nosey, mousey, skittish, the only one who actually seems upset (genuinely or guilty?) Motive: If Elizabeth was cut from Able’s will she would have nothing, she also lives in the house and would be kicked out once Able died Statement: “I still can’t believe that my father is dead (she covers her mouth as she sobs quietly). Here is what happened the day my father was murdered: I woke up around 8, as usual, and made breakfast for my father. When I brought it to him in his office he seemed more grumpy than usual; he has been acting strange the past few days. I asked him if everything was alright and he said that me and my spoiled ungrateful siblings were getting on his last nerve (she looked away when she said that). I guess he was still upset over his fight with Charles… I don't know what they were arguing about but I remember father saying something about Charles being a deadbeat and Charles saying “you shouldn't have done that”. After that Charles stormed out; I didn't think too much about it after all Charles was clearly father’s favorite. Anyway it's none of my business so I left father’s office but I did notice something before I left. I saw some papers on father's desk. I think it had to do with Benedict and the company. After leaving my father I had to go and run some errands. I always ran errands for father: to the grocery store, to the bank, the company building. I have been taking care of father since mother died… I am his dutiful daughter (she got quiet and was looking at her hands). Sorry anywho, I ran my errands and came home around noon, that's when I started making dinner, spaghetti and meatballs with homemade garlic bread. I was in the kitchen most of the day only really leaving if father needed something. Around 4 my sister arrived with the dessert and she and I talked in the kitchen. We mostly talked about father and how he has been acting weird lately. Eventually we got on the topic of father’s will. I asked Caroline what she thinks father will leave her, I just hope I get to stay in the house once father dies. Although, Caroline said “You’re incredibly naive if you think Able would leave anything to us.” I asked what she meant and she thinks that father won’t leave us anything because we’re girls (she looks away again). Father wouldn’t do that to us, (under her breath) I hope, I would be thrown out of the house and left with nothing (she seemed a little angry and even a bit scared). It doesn't matter. I know father will take care of us. Back to my day, Benedict arrived at 5, like he does every week, with the wine for dinner. I took the wine from him as I greeted him. He was clearly stressed out and irritated. He said it was company business and that I needed to stay out of it, then he left to see father. I went back to the kitchen and finished making dinner and then plated everything so we could eat. We were going to wait for Charles but the rule with Charles is “Charles is not coming until he is here”. It didn't matter; he arrived a few minutes later. When he came in I swear you could cut the tension with a knife, everyone could feel it, but we were still able to eat in peace. After dinner we all just hung around and chatted. That’s when I asked Charles about his fight with father and he said there was no fight, (under her breath) he is such a liar, and not five minutes later he pulled father aside and got into ANOTHER screaming match. Now I’ve heard them fight before but not like this… (she got serious) something happened during that fight. Not too long after it started it ended with Charles bursting out of father’s office and out the front door. The mood kinda died after that. Benedict thinks father finally gave Charles the wake up call he needed. Not long after everyone started to go home. I went to bed around 10 but before then I went to say goodnight to father. He was still in his office fuming over his fight with Charles. I didn't wake up at all during the night, I'm a very heavy sleeper. The next morning I woke up and found my father dead (she got very quiet and even looked a little pale).”
')"></div>
