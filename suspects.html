  <div id="clue-Elizabeth" class="hotspot" onclick="showClue('DESCRIPTION: Able LeDomas’ youngest daughter, nosey, mousey, skittish, the only one who actually seems upset (genuinely or guilty?) MOTIVE: If Elizabeth was cut from Able’s will she would have nothing, she also lives in the house and would be kicked out once Able died STATEMENT: “I still can’t believe that my father is dead (she covers her mouth as she sobs quietly). Here is what happened the day my father was murdered: I woke up around 8, as usual, and made breakfast for my father. When I brought it to him in his office he seemed more grumpy than usual; he has been acting strange the past few days. I asked him if everything was alright and he said that me and my spoiled ungrateful siblings were getting on his last nerve (she looked away when she said that). I guess he was still upset over his fight with Charles… I dont know what they were arguing about but I remember father saying something about Charles being a deadbeat and Charles saying “you shouldnt have done that”. After that Charles stormed out; I didnt think too much about it after all Charles was clearly father’s favorite. Anyway its none of my business so I left father’s office but I did notice something before I left. I saw some papers on fathers desk. I think it had to do with Benedict and the company. After leaving my father I had to go and run some errands. I always ran errands for father: to the grocery store, to the bank, the company building. I have been taking care of father since mother died… I am his dutiful daughter (she got quiet and was looking at her hands). Sorry anywho, I ran my errands and came home around noon, thats when I started making dinner, spaghetti and meatballs with homemade garlic bread. I was in the kitchen most of the day only really leaving if father needed something. Around 4 my sister arrived with the dessert and she and I talked in the kitchen. We mostly talked about father and how he has been acting weird lately. Eventually we got on the topic of father’s will. I asked Caroline what she thinks father will leave her, I just hope I get to stay in the house once father dies. Although, Caroline said “You’re incredibly naive if you think Able would leave anything to us.” I asked what she meant and she thinks that father won’t leave us anything because we’re girls (she looks away again). Father wouldn’t do that to us, (under her breath) I hope, I would be thrown out of the house and left with nothing (she seemed a little angry and even a bit scared). It doesnt matter. I know father will take care of us. Back to my day, Benedict arrived at 5, like he does every week, with the wine for dinner. I took the wine from him as I greeted him. He was clearly stressed out and irritated. He said it was company business and that I needed to stay out of it, then he left to see father. I went back to the kitchen and finished making dinner and then plated everything so we could eat. We were going to wait for Charles but the rule with Charles is “Charles is not coming until he is here”. It didnt matter; he arrived a few minutes later. When he came in I swear you could cut the tension with a knife, everyone could feel it, but we were still able to eat in peace. After dinner we all just hung around and chatted. That’s when I asked Charles about his fight with father and he said there was no fight, (under her breath) he is such a liar, and not five minutes later he pulled father aside and got into ANOTHER screaming match. Now I’ve heard them fight before but not like this… (she got serious) something happened during that fight. Not too long after it started it ended with Charles bursting out of father’s office and out the front door. The mood kinda died after that. Benedict thinks father finally gave Charles the wake up call he needed. Not long after everyone started to go home. I went to bed around 10 but before then I went to say goodnight to father. He was still in his office fuming over his fight with Charles. I didnt wake up at all during the night, Im a very heavy sleeper. The next morning I woke up and found my father dead (she got very quiet and even looked a little pale).”')"></div>
  <div id="clue-Caroline" class="hotspot" onclick="showClue('DESCRIPTION: Able Ledomas’ oldest daughter, quiet and reserved, calculating, manipulative, very smart (she reads lot and about everything) MOTIVE: She clearly hated her father and resented him for years of abuse… and she was (allegedly) not in his will STATEMENT: “Personally I dont plan on signing a requiem for (in air quotes) poor deceased Able. He was a monster and everyone knew it; his business rivals didnt call him the devil for nothing. Anyway this is what happened the day Able died: I arrived at the house around 4 with some cheap dessert I got at the store. When I got there I headed to the kitchen to see my sister. We talked for a while, mostly about Able, and eventually we started talking about the will. I don’t even know why we started talking about the will in the first place (she sounds really nervous). Its not like that misogynistic pig would leave anything to some girls (shes a bit angry now). But my clueless sister thought otherwise, going off about how she (mockingly) “hopes she can stay in the house”. Like that would ever happen. Whats going to happen is Able will leave everything to that deadbeat leech (she’s talking about Charles) and the rest of us will be forgotten, (under her breath) not surprising that Able would forget his children. (kinda to herself) I still cant believe that pig would leave his empire to an idiot. At that point I just left the kitchen to go read my book. I’ve been rereading this great book on law; I read it when I was younger but decided to pick it up again recently. So I headed to the library to read but (she looks away slightly) when I got there I found the key to Able’s office. I decided to just grab the key and give it back (she was fidgeting with her hands and looking around at this point). When I rounded the corner to get to Able’s office I bumped into Benedict. He looked pissed off about something and he asked me what I was doing with the key. I told him I was just returning it (she still seems nervous). Although I never did; I assumed Benedict and Able got into another fight and I did not want to get the brunt of Able’s furry, (quietly) again. So I left as quickly as I came and went back to the library to read until dinner. Dinner was served around 6 and OF COURSE Charles was late. He waltzed in about 15 minutes later and OF COURSE he immediately starts fighting with Benedict (she seems very irritated at this point). I don’t know what they were fighting about and I dont care. All I know is that they both looked pissed off in the end. After dinner we all just kinda sat around and chatted. Benedict was asking about what I was reading but I could tell he didn’t understand what I was reading nor did he actually care. That’s when I heard Able and Charles in another one of their screaming matches. I couldn’t help but smile at the thought that maybe Able was finally doing something right for once in his life and cutting out that little parasite (she sounded pretty angry saying that last part). Alas we cant all be that lucky. Anyway I didnt stick around much longer cause I wanted to avoid being the next target of Able’s temper. So I left and the next day I woke up to a call that someone had murdered Able.')"></div>
  <div id="clue-Charles" class="hotspot" onclick="showClue('DESCRIPTION: Able LeDomas’ youngest son, immature, sheltered, a man child, compulsive liar, not the sharpest tool in the shed MOTIVE: Able cut him out of the will (allegedly), no inheritance would mean he’d have to give up his lavish lifestyle STATEMENT: “I guess the old man’s sins finally caught up with him. Serves him right for being a huge d**k his whole life. Like when he stabbed his own twin brother in the back, like what the f**k. Whatever, here’s what happened the day the old man died: I got to the house around 5:40, (under his breath) I think, and everyone was already eating so I was like alright time to chow I guess. It was pretty good but not like the food my private chef makes. Ugh im really pissed off tho cause I got stupid sauce on my coat, that thing was Gouchi its gonna be a pain in the a** to get out, (under his breath) my drycleaner better not f**k it up. Anyway as we’re eating my stupid brother nudges me and asks me what Ill do once the old man cuts me off. So I asked him the same, cause there is totally this rumor that dad was gonna kick him out of the company. It was like history repeating itself or something. The old man’s original partner was his brother, Cain, but then the old man stole the company from Cain, who quickly went (in air quotes) missing… (leans in close) that old f**ker totally killed his a**. Whatever, I was able to shut Benny up real quick and we finished dinner. Thats when my nosey a** sister came up to me and she was all like (mockingly) “what were you and father fighting about the other day”. First of all I was NOT fighting with the old man, sure I went to go see him but there was NO fighting. I just needed some money and sure the old man got a little steamed but NOTHING HAPPENED (he is looking around a lot at this point). Also why is she so interested in the old man’s will? Its not like she’ll get anything, (really quietly and to himself) because I’ll get everything. But second of all I told her what I talk about with the old man is none of her d**n business. That’s when I remembered I uhh wanted to ask the old man about umm borrowing one of his sick rides, (under his breath) yeah, and so I pulled him into his office. Okay that time we got into a huge fight cause I wanted to borrow the porsche but he said no, (under his breath) that f**king d**k, any who we started screaming and I left. Next morning I wake up to a copper on my door telling me the old man was dead.”')"></div>
  <div id="clue-Benedict" class="hotspot" onclick="showClue('DESCRIPTION: Able LeDomas’ oldest son, grumpy, serious, manipulative, charismatic MOTIVE: Rumor has it Able wanted to force him out of the company, and if history was to repeat itself then it could have meant death for Benedict STATEMENT: “I hope this wont take long. I have an important meeting to attend to. Alright, heres what happened the day my dad died: I arrived at the house at 5:00, I had been in the office earlier that day and then ran to the store to get the wine for dinner. When I got there my (through gritted teeth) annoying little sister, Lizzy, started pestering me about my company. I told her it was none of her business what goes on with the company. I then left to see my dad; I was about to enter his office but I overheard him talking about umm… (he got quiet and looked away slightly) business. Not wanting to be rude I left thats when I ran into Caroline. When I saw her she looked like the cat that ate the canary and I noticed she had the key to dad’s office. I asked her what she was doing with it and she said she was just returning it to dad and then she left, kinda in a hurry. I wouldn’t be surprised if she was just snooping for the fun of it, (quietly and kinda to himself) she’s always been a little nosey. Anyway, after that I just hung around until it was time for dinner. We started dinner around 6 and not 15 minutes into dinner did my dead beat baby brother finally arrive… (sounding very annoyed) because of course he was late AGAIN. Now I shouldn’t be spreading rumors but the other day I overheard dad on the phone and he said something about (in air quotes) finally putting that leech in his place. OF COURSE he was talking about Charles and knowing this juicy bit of information well I just had to rub it in that (through gritted teeth) little s**t’s face. So once he sat down I leaned in and asked him if dad finally did what he should have done a long time ago (he sounded pretty angry saying that last part). He just looks at me with that same s**t eating grin and says that it was none of my business. Then he had the gall to ask me if the rumors about dad firing me were true. (mockingly) “if he does fire you do you think he’ll kill you like he killed Uncle Cain”. That’s what he said to me! That little s**t has NEVER worked a day in his g*d d**n LIFE and constantly gets REWARDED for it meanwhile I have been bending over BACKwards for YEARS to meet dad’s approval (he is fuming at this point and takes a moment to recompose himself). Sorry my brother has always gotten under my skin rather easily. Also there is no way the rumor about what happened to my uncle is true (he sounds very nervous and even a bit scared). Out of umm, (he looks away) curiosity, I decided to look into what happened and I uh found, (he is starting to go pale) nothing (he stares off for a moment). Sorry Im getting off track, once we finished dinner we all hung around the living room. I was chatting with Caroline, she was reading some book about law. I noticed she was on a page about will laws, she had some not about a uh slayer rule or something. Elizabeth had been talking to Charles and Charles, well he looked, (kinda sing songy) really nervous. Thats when he pulled dad into his office and OH BOY the screaming match that followed WAS F**KING GOLDEN. (kinda to himself) I knew I was no d**n leech. After that nothing much happened… although I did notice that when Charles left Caroline had this sorta checkmate look on her face. Not sure what that means but it doesn’t matter; she was gone by 8:30 ish. I left around 9 and the next morning I woke up to a tsunami of phone calls from business execs and police… (his tone got cold) someone had murdered my dad.”')"></div>
  <div id="clue-Able" class="hotspot" onclick="showClue('DESCRIPTION: cold and cruel to his children, wealthy beyond imagine, cunning and manipulative, the devil (working with him was like dealing with the devil), stern and serious, no sense of humor CAUSE OF DEATH: several stab wounds; none of the wounds are the same (clearly a crime of passion), found November 10 at 8:00am, time of death estimated to be around midnight, murder weapon not found but most likely a knife')"></div>
