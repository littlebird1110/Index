<html>
<body>

<div id="question-container">
    <p>Who murdered Able LeDomas?</p>
    <input type="text" id="userInput" placeholder="Type your answer here...">
    <button onclick="checkAnswer()">Submit</button>
    
    <p id="feedback"></p>
    
    <img id="successGif" src="images/yay.gif" style="display:none; width: 200px; margin-top: 10px;">
</div>

<script>
function checkAnswer() {
    const correctAnswers = ["elizabeth"; "caroline"; "charles"; "benedict"; "cain"; "all of them"; "all"];
    const userResponse = document.getElementById("userInput").value.trim().toLowerCase();
    const feedback = document.getElementById("feedback");
    const gif = document.getElementById("successGif");

    if (userResponse === correctAnswer) {
        feedback.innerHTML = "Congratulations, <b>you</b> solved the murdered of Able LeDomas";
        feedback.style.color = "#481F1D";
        gif.style.display = "block";

        setTimeout(() => {
            gif.style.display = "none";
        }, 3000);

    } else {
        feedback.innerHTML = "Incorrect. Please Try Again";
        feedback.style.color = "#481F1D";
        gif.style.display = "none";
    }
}
</script>

</body>
</html>
