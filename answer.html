<body>

<img id="feedback"></p>
scr="images/yay.gif"

<script>
function checkAnswer() {
const correctAnswer = "Benedict";
const userResponse = document.getElementById("userInput").value.trim().toLowerCase();

const gif = document.getElementById("successGif");

if (userResponse === correctAnswer) {
feedback.innerHTML = "Yes, <b>Benedict</b> murdered Able LeDomas";
feedback.style.color = "#3D532E";

gif.style.display = "block";

setTimeout(() => {
gif.style.disply = "none";
}, 3000);

} else {
feedback.inner.HTML = "Incorrect. Please Try Again";
feedback.style.color = "#632222";
gif.style.display = "none";
}
}
</script>
